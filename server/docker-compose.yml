services:
  postgres:
    image: postgres:16-alpine
    container_name: misty-server-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-misty}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-misty}
      POSTGRES_DB: ${DB_NAME:-misty_server}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-misty} -d ${DB_NAME:-misty_server}"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  pgdata:
